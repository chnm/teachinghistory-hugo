baseURL = 'https://dev.teachinghistory.org/'
languageCode = 'en-us'
title = 'TeachingHistory.org'

# Preserve all Drupal metadata
[frontmatter]
  date = ['date', 'publishDate', 'lastmod']
  lastmod = ['lastmod', ':git', 'date', 'publishDate']

[params]
  description = 'TeachingHistory.org - Resources for History Educators'

[taxonomies]
  category = 'categories'
  tag = 'tags'
  topic = 'topics'
  time_period = 'time_periods'
  evidence_type = 'evidence_types'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Related content — used for "Related Topics" on detail pages.
# Weights control how much each index contributes to the relevance score.
[related]
  includeNewer = true
  threshold = 30
  toLower = true
  [[related.indices]]
    name = "topics"
    weight = 100
    toLower = true
  [[related.indices]]
    name = "tags"
    weight = 80
    toLower = true
  [[related.indices]]
    name = "time_periods"
    weight = 60
    toLower = true
  [[related.indices]]
    name = "keywords"
    weight = 40
    toLower = true
  [[related.indices]]
    name = "date"
    weight = 10

# Navigation — matches DESIGN.md NavBar spec
[menu]
  [[menu.main]]
    identifier = 'about'
    name = 'About Us'
    url = '/about/'
    weight = 10

  [[menu.main]]
    identifier = 'teaching-materials'
    name = 'Teaching Materials'
    url = '/teaching-materials/'
    weight = 20

  [[menu.main]]
    identifier = 'history-content'
    name = 'History Content'
    url = '/history-content/'
    weight = 30

  [[menu.main]]
    identifier = 'best-practices'
    name = 'Best Practices'
    url = '/best-practices/'
    weight = 40

  [[menu.main]]
    identifier = 'digital-classroom'
    name = 'Digital Classroom'
    url = '/digital-classroom/'
    weight = 50
