{{/*
  Search card fields for Teaching Materials subsections.
  Keyword search + Grade Level dropdown.
*/}}

<div class="flex flex-col gap-4">
  <div>
    <label for="filter-keyword" class="font-heading text-xs font-bold uppercase tracking-wide text-gray-500 mb-1 block">Keyword</label>
    <input id="filter-keyword" type="text" placeholder="Search by keyword..."
           class="w-full border border-gray-light rounded px-3 py-2 text-sm font-body focus:outline-none focus:ring-2 focus:ring-orange">
  </div>

  <div>
    <label for="filter-grade" class="font-heading text-xs font-bold uppercase tracking-wide text-gray-500 mb-1 block">Grade Level</label>
    <select id="filter-grade"
            class="w-full border border-gray-light rounded px-3 py-2 text-sm font-body focus:outline-none focus:ring-2 focus:ring-orange bg-white">
      <option value="">All Grades</option>
      <option value="elementary">Elementary</option>
      <option value="middle">Middle School</option>
      <option value="high">High School</option>
    </select>
  </div>
</div>
