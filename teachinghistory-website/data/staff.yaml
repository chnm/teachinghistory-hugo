groups:
  - name: Leadership and Content Team
    members:
      - name: Kelly Schrum
        role: Director and PI
        bio: >
          Director of Educational Projects at CHNM and an Associate Professor
          in the Higher Education Program at George Mason University. Co-directs
          multiple educational websites including World History Sources and Women
          in World History. Academic Program Director for Teaching American
          History grants in Virginia and Maryland. Holds BA from UC Berkeley and
          PhD from Johns Hopkins University. Author of works on teenage girls'
          culture and history education.

      - name: Nate Sleeter 
        role: Co-Project Director
        bio: > 
          Nate Sleeter directs current education projects at the center and serves as the point of contact for legacy education projects. A former classroom teacher, his work at RRCHNM includes helping to develop, administer, and research history education resources for K-16 students and educators. He is especially interested inquiry-based approaches that explore how historians analyze evidence. He has also worked to develop online and hybrid courses including Teaching Hidden History, Hidden in Plain Sight, and Virginia Studies. Nate has a PhD from Mason on the history of gifted children in the United States.
      
      - name: Timmia King 
        role: Graduate Research Assistant
        bio: >
          Timmia King is a Ph.D. canidate in the History department and a Graduate Research Assistant at the Roy Rosenzweig Center for History and New Media. She is currently working on a project called the HBCU History & Culture Access Consortium. Timmia received her bachelor’s degree in African American Studies from Howard University, and a dual master degree in African American and African Diaspora Studies and Library Sciences from Indiana University. Her research interests include African American memory work, specifically their self-documenting practices and generally 20th century military history of Africans apart of the diaspora and on the continent.

      - name: Annabelle Spencer
        role: Graduate Research Assistant
        bio: >
          Annabelle Spencer is a PhD student in History, specializing in Women & Gender History and Digital Humanities. She is a Graduate Research Assistant at the Roy Rosenzweig Center for History and New Media (RRCHNM) and an affiliate for the Center for Mason Legacies (CML). She received her BA in History from Austin Peay State University and MA in History‬ from George Mason University. At RRCHNM, she has worked on the Smithsonian HBCU History, Culture, and Access Consortium (HCAC) Project and R2 Studios’ podcasts Worlds Turned Upside Down and Your Most Obedient and Humble Servant. Currently, she is supporting the center's digital pedagogy initiatives.

  - name: Web Design and Development
    members:
      - name: Jason A. Heppler
        role: Senior Developer-Scholar
        bio: >
          Jason A. Heppler is a historian and senior web developer at the Roy 
          Rosenzweig Center for History and New Media. He specializes in the 
          twentieth century environmental history of the North American West and 
          Great Plains, focusing on political, urban, and agricultural histories 
          surrounding land use, climate, political change, and the experience of 
          landscapes. He is the author of *[Silicon Valley and the Environmental 
          Inequalities of High-Tech Urbanism](https://www.oupress.com/9780806193748/silicon-valley-and-the-environmental-inequalities-of-high-tech-urbanism/)* (2024), co-editor of *[Digital 
          Community Engagement: Partnering Communities with the Academy](https://ucincinnatipress.manifoldapp.org/projects/digital-community-engagement)* (2020), 
          and co-creator, technical lead, or project principal on several 
          digital history projects. Additionally, he is an Affiliate Fellow 
          at the Center for Great Plains Studies at the University of 
          Nebraska-Lincoln.
      
      - name: Igor Jovivic
        role: Designer, Big Yellow Taxi
      
      - name: Tony Vecchione
        role: Designer, Big Yellow Taxi

  - name: Alumni
    members:
      - name: Teresa DeFlitch
        role: Former Outreach Manager
        bio: >
          Currently Director of City as Our Campus at Winchester Thurston School
          in Pennsylvania. Former Outreach Manager on Teachinghistory.org.
          Served as Associate Director of Education at Bush-Holley Historic
          Site. MA in American History from Maxwell School at Syracuse University
          with specialization in African American history and race.

      - name: Lee Ann Ghajar
        role: Former Project Manager
        bio: >
          Served as project manager from 2007-2010. Currently digital history
          associate in Public Projects at CHNM working with Teaching History
          Commons. PhD candidate in American history at George Mason University
          with research interests in 19th-century Southern industrial history
          and intersection of new media and historical presentation.

      - name: Sharon Leon
        role: Former Co-Director
        bio: >
          Director of Public Projects at the Roy Rosenzweig Center for History
          and New Media and Research Assistant Professor in the History and Art
          History Department at George Mason University. BA in American Studies
          from Georgetown University; doctorate in American Studies from
          University of Minnesota. Directed and co-directed multiple
          award-winning digital projects on historical thinking.

      - name: Sam Wineburg
        role: Former Director
        bio: >
          Margaret Jacks Professor of Education and of History (by courtesy) at
          Stanford. Directs Stanford History Education Group and PhD program in
          History Education. 2003 recipient of Frederic W. Ness Award. 2007
          recipient of American Historical Association's William Gilbert Prize.
      
      - name: Daisy Martin
        role: Director of History Education
        bio: >
          Former high school history and civics teacher who served as co-director
          of the Stanford History Education Group. Earned PhD in Curriculum and
          Teacher Education in 2005. Recently co-directed Historical Thinking
          Matters and teaches history teacher-candidates. Has worked with K-12
          teachers across multiple states on professional development funded by
          NEH and other organizations.

      - name: Dan Cohen
        role: Former Executive Producer
        bio: >
          Associate Professor in the Department of History and Art History at
          George Mason University and the Director of the Roy Rosenzweig Center
          for History and New Media. Research focuses on European and American
          intellectual history and the intersection of history and computing.
          Co-author of Digital History and author of Equations from God.
          Inaugural ACLS Digital Innovation Fellow.

      - name: Jennifer Rosenfeld
        role: Former Outreach Director
        bio: >
          Joined in September 2010. Previously served as Deputy Executive
          Director of the Abraham Lincoln Bicentennial Commission. Earlier
          experience includes Education Director roles at Long Island Museum and
          Old York Historical Society. Holds BA in History from College of
          William and Mary and MA in History Museum Studies from Cooperstown
          Graduate Program.

      - name: Carl Aldrich
        role: Former Graduate Outreach Assistant
        bio: >
          Graduate student at George Mason University pursuing MA in U.S. and
          Applied History. Earned BA in History from Utah State University in
          2011. Completed internship with Bear River Heritage Area documenting
          cemeteries in northern Utah and southeastern Idaho.

      - name: John Buescher
        role: Former Historian and Researcher
        bio: >
          Headed the Voice of America's radio and TV Tibetan language broadcasts
          for more than 15 years. Served as Assistant Professor in Philosophy
          and Religion at UNC Wilmington and as Program Officer at NEH. PhD in
          Religious Studies from University of Virginia. Published extensively on
          Tibetan and Indian Buddhism and 19th-century American Spiritualism.

      - name: Kristin Conlin
        role: Former Research Associate
        bio: >
          Earned BA in history at St. Mary's College of Maryland and MA at
          George Mason University. Assistant Editor of The Papers of the War
          Department digital archiving project. Previously worked on First
          Federal Congress project. Head Coach of St. Mary's College of Maryland
          Crew Team.

      - name: Alan Gevinson
        role: Former Historian
        bio: >
          Co-author of History Matters: A Student Guide to U.S. History Online.
          Author and editor of multiple works on American film and motion
          pictures. PhD in history from Johns Hopkins University and teaches at
          George Mason University. Specializes in 19th- and 20th-century
          American cultural history, media history, and film history.

      - name: Lara Harmon-Sutor
        role: Former Content and Social Media Manager
        bio: >
          Earned BA in theatre from George Mason University in 2008. Interests
          include social media, digital content curation, and gender studies.

      - name: Debra Kathman
        role: Former Graduate Research Assistant
        bio: >
          Graduate research assistant specializing in modern European history.
          Former attorney and nonprofit professional with research interests in
          legal history and the history of charitable organizations in Europe
          and America.

      - name: "Sa\xFAl I. Maldonado"
        role: Former Graduate Student Researcher
        bio: >
          Former Northwest Pasadena (CA) English teacher and Los Angeles college
          access program director. Doctoral student in Education at UC Santa
          Cruz. Teaching and research interests centered on equity and diversity
          policies, curriculum design, and assessment evaluation.

      - name: Rachel Pooley
        role: Former Graduate Research Assistant
        bio: >
          Doctoral student in colonial Latin American history at George Mason
          University. Previously taught fifth grade (bilingual) and kindergarten
          in Austin, Texas. Holds master's degrees in Latin American History and
          Library Science.

      - name: Jack Schneider
        role: Former Senior Research Associate
        bio: >
          Former high school history teacher currently teaching in Educational
          Studies department at Carleton College. Research focuses on equity and
          school reform. Author of Excellence For All about school reformers
          transforming public education.

      - name: Rwany Sibaja
        role: Former Graduate Research Assistant
        bio: >
          Doctoral student specializing in modern Latin America. Primary
          research focuses on national and cultural identity in modern Argentina
          through soccer lens. Over a decade experience as high school Spanish
          and history teacher and K-12 Social Studies Program Manager in North
          Carolina. AP European History exam reader.

      - name: Mark Smith
        role: Former Research Associate
        bio: >
          Second-year doctoral student in School of Education at Stanford.
          Formerly taught high school social studies in Iowa and Texas.
      
      - name: James McCartney
        role: Former Lead Developer
        bio: >
          CHNM developer specializing in web-based content management systems
          and lead developer for Teachinghistory.org. Experienced in web
          software analysis and design, PHP software development, and relational
          database architecture. BS in Computer Information Systems from Missouri
          State University; pursuing MS in Applied Information Technology from
          George Mason University.

      - name: Chris Preperato
        role: Former Multimedia Developer
        bio: >
          Lead video editor at CHNM. BA in Communication Arts from Allegheny
          College specializing in Video Production. Produced more than 350
          videos, including interviews with historians and teachers, montages,
          and classroom filming. Also produced seven-part radio mini-series and
          documentaries accepted into film festivals.

      - name: Chris Raymond
        role: Former Lead Web Designer
        bio: >
          Senior Web Designer/Creative Lead at CHNM. Diverse experience in
          graphic design, web design, science museum exhibit research, and
          science journalism. PhD in sociology from Cornell University
          emphasizing mass media and sociology of science. Formally studied
          graphic design at Virginia Commonwealth University.

      - name: Ammon Shepherd
        role: Former Webmaster
        bio: >
          Webmaster and Technical Coordinator at CHNM. MA in history from George
          Mason University; currently enrolled in doctoral program. Research
          interests focus on the history of the Church of Jesus Christ of
          Latter-day Saints in Germany.